name: Deploy n8n workflow

on:
  push:
    branches: [master]
    paths:
      - "n8n/workflows/veille-automatisee.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push workflow to n8n
        run: |
          jq '
            del(.active) |
            (.nodes[] | select(.credentials.openAiApi) | .credentials.openAiApi.id) = "${{ secrets.N8N_PROD_OPENAI_CREDENTIAL_ID }}" |
            (.nodes[] | select(.credentials.httpHeaderAuth) | .credentials.httpHeaderAuth.id) = "${{ secrets.N8N_PROD_RESEND_CREDENTIAL_ID }}"
          ' n8n/workflows/veille-automatisee.json | \
          curl --fail-with-body -s -X PUT \
            "${{ secrets.N8N_URL }}/api/v1/workflows/${{ secrets.N8N_WORKFLOW_ID }}" \
            -H "X-N8N-API-KEY: ${{ secrets.N8N_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @-
